[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
bdd_features_base_dir = tests/features
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    bdd: BDD tests using pytest-bdd
    unit: Unit tests
    integration: Integration tests
